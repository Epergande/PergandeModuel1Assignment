<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mortgage Calculator</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../javascript/index.js"></script>
</head>
<body>
<h1>Mortgage Calculator</h1>
<div class ="mortgage-form">
<form >
    <div>
        <label For="p">Total amount of the user's loan:<br></label>
        <input type="number" name="p" id="p"/>
    </div>
    <div>
        <label For="r"><br>Interest rate:<br></label>
        <input type="number" name="r" id="r"/>
    </div>
    <div>
        <label For="n"><br>Length of the loan in years:<br></label>
        <input type="number" name="n" id="n"/>
    </div>
    <div >
        <button type="button" onClick="calculate()">Calculate Mortgage</button>
    </div>
</form>
<div>
<p>Monthly Payment = $<span id="calc"></span><br></p>
</div>
</div>

<div>
    <p class = "bottom">Elliott Pergande 2025</p>
</div>
</body>
</html>
